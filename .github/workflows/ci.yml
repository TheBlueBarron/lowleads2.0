name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.1.0'

# Workspace lives under mvp/ — run all shell commands from there.
defaults:
  run:
    working-directory: mvp

jobs:
  # ─── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: mvp/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

  # ─── Type check ────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: mvp/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages (required for type resolution)
        run: |
          pnpm --filter @lowleads/shared-types build
          pnpm --filter @lowleads/db build

      - name: Type check all packages
        run: pnpm typecheck

  # ─── Unit tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: mvp/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @lowleads/shared-types build
          pnpm --filter @lowleads/db build

      - name: Run unit tests with coverage
        run: pnpm --filter @lowleads/api test -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: mvp/apps/api/coverage/
          retention-days: 7

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: mvp/apps/api/coverage/coverage-summary.json
        continue-on-error: true

  # ─── Integration tests ─────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lowleads_test
          POSTGRES_PASSWORD: lowleads_test
          POSTGRES_DB: lowleads_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: mvp/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @lowleads/shared-types build
          pnpm --filter @lowleads/db build

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://lowleads_test:lowleads_test@localhost:5433/lowleads_test
        run: pnpm --filter @lowleads/db migrate:up

      - name: Run integration tests
        env:
          TEST_DATABASE_URL: postgresql://lowleads_test:lowleads_test@localhost:5433/lowleads_test
          TEST_REDIS_URL: redis://localhost:6380
          NODE_ENV: test
          # KMS is mocked in test mode — no real AWS calls
          AWS_REGION: us-west-2
        run: pnpm --filter @lowleads/api test:integration

  # ─── Security scan ─────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      # CodeQL needs to upload SARIF results to the code-scanning API.
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: mvp/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Audit at "critical" until we land the major-version bumps for Next.js
      # (to 15.x) and Fastify (to 5.x) that clear the remaining "high" CVEs in
      # those direct deps. All critical CVEs are patched via the overrides in
      # the root package.json + bumping next to 14.2.35.
      - name: npm audit (fail on critical)
        run: pnpm audit --audit-level=critical

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild for CodeQL
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  # ─── Docker build ──────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests]
    permissions:
      id-token: write # Required for OIDC auth with AWS
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC — no long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecr
          aws-region: us-west-2

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: mvp
          file: mvp/apps/api/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/lowleads/staging/api:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/lowleads/staging/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Only push signed images (trust enforced at ECS pull time)
          provenance: true
          sbom: true

      - name: Output image digest
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Image pushed: ${{ steps.ecr-login.outputs.registry }}/lowleads/staging/api:${{ github.sha }}"

  # ─── Deploy to staging ─────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build, integration-tests, security]
    if: github.ref == 'refs/heads/main'
    environment: staging
    permissions:
      id-token: write
      contents: read

    steps:
      # Checkout so the `working-directory: mvp` default at the top of this
      # workflow has somewhere to cd into. Deploy steps don't actually need
      # any repo files, but the runner default fails without a working dir.
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecs-deploy
          aws-region: us-west-2

      - name: Deploy to ECS staging (rolling update)
        run: |
          aws ecs update-service \
            --cluster lowleads-staging \
            --service lowleads-staging-api \
            --force-new-deployment \
            --region us-west-2

      - name: Wait for deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster lowleads-staging \
            --services lowleads-staging-api \
            --region us-west-2

      - name: Smoke test staging
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://staging-api.lowleads.com/health || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: /health returned $STATUS"
            exit 1
          fi
          echo "Smoke test passed: /health returned 200"

  # ─── Deploy to production (manual approval required) ──────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment: production # GitHub Environment protection rule requires manual approval
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecs-deploy-prod
          aws-region: us-west-2

      - name: Deploy to ECS production (rolling update)
        run: |
          aws ecs update-service \
            --cluster lowleads-production \
            --service lowleads-production-api \
            --force-new-deployment \
            --region us-west-2

      - name: Wait for deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster lowleads-production \
            --services lowleads-production-api \
            --region us-west-2

      - name: Health check production
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://api.lowleads.com/health || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "Production health check failed: /health returned $STATUS"
            exit 1
          fi
